<!DOCTYPE html>
<html lang="zh-Hant-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>陋室點傑森</title>
    </head>
    <body>
        <main>
            <small>註：換行直接打「\r\n」就行，有修改的既有法規再勾，修改既有法規留白代表如舊，整部廢止則按「X」，新增法規按最下面提交旁的「+」</small>
            <small>註2：刪除某條文時可按「X」，但若是修正為「（刪除）」，請直接在「修正條文」一欄填入「（刪除）」而非按「X」</small>
            <form id="l">
                <input id="gen" type="submit" formmethod="dialog" />
            </form>
            <div id="preview">
                <label for="out">
                    <code>Preview</code>
                </label>
            </div>
            <textarea id="out" rows="30" cols="100" readonly></textarea>
         </main>
